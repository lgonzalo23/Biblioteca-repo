<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Luz del Saber | Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/logins.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

    <div class="register-card">
        <div class="brand-section text-center">
            <a th:href="@{/}" class="text-decoration-none">
                <img th:src="@{/img/Logo_LuzdelSaber.png}" alt="Logo Luz del Saber" class="register-logo">
                <h1 class="brand-name text-dark">Crea tu Cuenta</h1>
            </a>

            <p class="brand-subtitle">Unete a Luz del Saber</p>
        </div>

        <div th:if="${errorMessages}" class="alert alert-danger" role="alert">
            <div class="d-flex gap-2">
                <i class="fa-solid fa-circle-exclamation mt-1"></i>
                <div>
                    <div th:each="error : ${errorMessages}" th:text="${error}">Error</div>
                </div>
            </div>
        </div>

        <form th:action="@{/register}" th:object="${usuarioForm}" method="post">
            <div class="row">
                <div class="col-md-6 mb-4 text-start">
                    <label for="nombre" class="form-label">Nombre</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 rounded-start-3">
                            <i class="fa-solid fa-user text-muted"></i>
                        </span>
                        <input type="text" id="nombre" th:field="*{nombre}" class="form-control border-start-0"
                            placeholder="Ingrese su nombre" minlength="2" maxlength="50" required>
                    </div>
                </div>

                <div class="col-md-6 mb-4 text-start">
                    <label for="apellido" class="form-label">Apellido</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 rounded-start-3">
                            <i class="fa-solid fa-user text-muted"></i>
                        </span>
                        <input type="text" id="apellido" th:field="*{apellido}" class="form-control border-start-0"
                            placeholder="Ingrese su apellido" minlength="2" maxlength="50" required>
                    </div>
                </div>
            </div>

            <div class="mb-4 text-start">
                <label for="dni" class="form-label">DNI</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 rounded-start-3">
                        <i class="fa-solid fa-id-card text-muted"></i>
                    </span>
                    <input type="text" id="dni" th:field="*{dni}" class="form-control border-start-0"
                        placeholder="Ingrese su DNI" maxlength="8" minlength="8" pattern="[0-9]{8}" inputmode="numeric"
                        required>
                </div>
            </div>

            <div class="mb-4 text-start">
                <label for="correo" class="form-label">Correo electronico</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 rounded-start-3">
                        <i class="fa-solid fa-envelope text-muted"></i>
                    </span>
                    <input type="email" id="correo" th:field="*{correo}" class="form-control border-start-0"
                        placeholder="Ingrese su correo electronico" maxlength="50" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4 text-start">
                    <label for="contrasena" class="form-label">Contrasena</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 rounded-start-3">
                            <i class="fa-solid fa-lock text-muted"></i>
                        </span>
                        <input type="password" id="contrasena" th:field="*{contrasena}"
                            class="form-control border-start-0" placeholder="Ingrese una contrasena" minlength="8"
                            maxlength="50" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,50}"
                            title="Debe incluir mayuscula, minuscula, numero y caracter especial." required>
                    </div>
                </div>

                <div class="col-md-6 mb-4 text-start">
                    <label for="confirmContrasena" class="form-label">Confirmar contrasena</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 rounded-start-3">
                            <i class="fa-solid fa-shield-halved text-muted"></i>
                        </span>
                        <input type="password" id="confirmContrasena" th:field="*{confirmContrasena}"
                            class="form-control border-start-0" placeholder="Repita la contrasena" minlength="8"
                            maxlength="50" required>
                    </div>
                </div>
            </div>

            <div class="mb-4 form-check text-start">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label" for="terms">
                    Acepto las
                    <a href="#">politicas de privacidad</a>
                    y los
                    <a href="#">terminos de uso</a>
                    de la biblioteca.
                </label>
            </div>

            <button type="submit" class="btn btn-register shadow-sm">Registrarme</button>
        </form>

        <div class="footer-links">
            <p>
                Ya tienes una cuenta?
                <a th:href="@{/login}">Inicia sesion aqui</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
