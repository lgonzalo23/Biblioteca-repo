<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Luz del Saber | Iniciar Sesión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/logins.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

    <div class="login-card text-center">
        <a th:href="@{/}" class="text-decoration-none">
            <img th:src="@{/img/Logo_LuzdelSaber.png}" alt="Logo Luz del Saber" class="login-logo">
            <h1 class="brand-name text-dark">
                Luz del Saber
            </h1>
        </a>

        <p class="brand-subtitle">
            Portal De Conocimiento
        </p>

        <div th:if="${loginError}" class="alert alert-danger" role="alert">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:text="${loginError}">Tu cuenta esta suspendida.</span>
        </div>

        <div th:if="${param.error}" class="alert alert-danger" role="alert">

            <i class="fa-solid fa-circle-exclamation"></i>
            Credenciales incorrectas. Inténtalo nuevamente.
        </div>

        <div th:if="${param.registered}" class="alert alert-success" role="alert">
            Registro exitoso. Inicia sesión para continuar.
        </div>

        <form th:action="@{/auth/login}" method="post">
            <div class="mb-4 text-start">
                <label for="username" class="form-label">
                    Correo electrónico
                </label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 rounded-start-3">
                        <i class="fa-solid fa-envelope text-muted"></i>
                    </span>
                    <input type="email" id="username" name="username" class="form-control border-start-0"
                        placeholder="Ingrese su correo" required autofocus>
                </div>
            </div>

            <div class="mb-3 text-start">
                <div class="d-flex justify-content-between align-items-center">
                    <label for="password" class="form-label">
                        Contraseña
                    </label>
                    <a href="#" class="text-muted small text-decoration-none">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>

                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 rounded-start-3">
                        <i class="fa-solid fa-lock text-muted"></i>
                    </span>
                    <input type="password" id="password" name="password" class="form-control border-start-0"
                        placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                Iniciar Sesión
            </button>

        </form>

        <div class="divider">o</div>

        <div class="footer-links">
            <p class="text-muted mb-1">
                ¿Aún no tienes cuenta?
            </p>
            <a th:href="@{/registro}">
                Regístrate como nuevo usuario
            </a>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
